name: Build and Publish Docker Image

on:
  schedule:
    - cron: '45 3 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      agh_ver:    ${{ steps.extract.outputs.agh_ver }}
      lego_ver:   ${{ steps.extract.outputs.lego_ver }}
      alpine_dig: ${{ steps.extract.outputs.alpine_dig }}
      image_base: ${{ steps.extract.outputs.image_base }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract versions from Dockerfile
        id: extract
        run: |
          # Parse strictly from the Dockerfile FROM directives
          AGH_VER=$(awk -F'[:@]' '/FROM adguard\/adguardhome/ {gsub(/^v/, "", $2); print $2}' Dockerfile)
          LEGO_VER=$(awk -F'[:@]' '/FROM goacme\/lego/ {gsub(/^v/, "", $2); print $2}' Dockerfile)
          ALPINE_DIG=$(awk -F'[@ ]' '/FROM alpine:/ {print $3}' Dockerfile)
          IMAGE_BASE=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')

          [ -n "${AGH_VER}" ]    || { echo "ERROR: failed to parse AGH version"; exit 1; }
          [ -n "${LEGO_VER}" ]   || { echo "ERROR: failed to parse Lego version"; exit 1; }
          [ -n "${ALPINE_DIG}" ] || { echo "ERROR: failed to parse Alpine digest"; exit 1; }

          echo "agh_ver=${AGH_VER}"       >> "$GITHUB_OUTPUT"
          echo "lego_ver=${LEGO_VER}"     >> "$GITHUB_OUTPUT"
          echo "alpine_dig=${ALPINE_DIG}" >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            push_tag_suffix: -amd64
          - platform: linux/arm64
            push_tag_suffix: -arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ needs.prepare.outputs.image_base }}:${{ needs.prepare.outputs.agh_ver }}${{ matrix.push_tag_suffix }}
          provenance: false
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.agh_ver }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=AdGuard Home + Unbound + Lego Auto-Renew
            dev.lego.version=${{ needs.prepare.outputs.lego_ver }}
            dev.alpine.digest=${{ needs.prepare.outputs.alpine_dig }}

  merge:
    name: Merge fat manifests
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create default fat manifest
        run: |
          BASE=${{ needs.prepare.outputs.image_base }}
          VER=${{ needs.prepare.outputs.agh_ver }}

          docker buildx imagetools create \
            --tag "${BASE}:${VER}" \
            --tag "${BASE}:latest" \
            "${BASE}:${VER}-amd64" \
            "${BASE}:${VER}-arm64"
