name: adguardhome

services:
  agh:
    container_name: agh
    hostname: agh
    image: ghcr.io/webstudiobond/agh-unbound-lego:latest
    pull_policy: always
    restart: unless-stopped

    networks:
      dns:
        # Provides a predictable target for other Docker containers and host OS resolution.
        ipv4_address: 10.101.100.2

    ports:
      # Standard UDP/TCP resolution. Essential for legacy clients lacking DoT/DoH support.
      # - 127.0.0.1:6553:53/tcp
      # - 127.0.0.1:6553:53/udp
      # DHCP server requires host network mode or explicit broadcast routing.
      # - 127.0.0.1:67:67/udp
      # - 127.0.0.1:68:68/tcp
      # - 127.0.0.1:68:68/udp
      # Admin panel and DoH endpoints.
      - 127.0.0.1:8002:80/tcp
      - 127.0.0.1:6443:443/tcp
      - 127.0.0.1:6443:443/udp
      # DNS-over-TLS endpoint.
      - 853:853/tcp
      # DNS-over-QUIC endpoint.
      - 853:853/udp
      # DNSCrypt server endpoint.
      #- 5443:5443/tcp
      #- 5443:5443/udp
      # Exposes pprof endpoints for memory/CPU profiling during active troubleshooting.
      #- 127.0.0.1:6060:6060/tcp

    environment:
      - LOG_LEVEL=error
      # Set to true to automatically provision Let's Encrypt TLS certificates.
      - LEGO_ENABLE=false
      # Required if LEGO_ENABLE=true. Specify your fully qualified domain name.
      - ACME_DOMAIN=
      # Uncomment if DoQ connections drop due to ISP middleboxes stripping ECN marks.
      # - QUIC_GO_DISABLE_ECN=true

    volumes:
      # adguardhome container work directory
      - ./data/agh/work:/opt/adguardhome/work/data
      # adguardhome container conf directory
      - ./data/agh/conf:/opt/adguardhome/conf
      # unbound dir with custom config and root.key
      - ./data/unbound:/opt/unbound
      # lego stores wildcard certificates here; AGH reads them from /opt/lego
      - ./data/lego:/opt/lego
      # Timezone from host — avoids tzdata in the image.
      - /etc/localtime:/etc/localtime:ro

    # Mitigates persistence of malicious payloads if the container is compromised.
    read_only: true
    tmpfs:
      # Volatile scratch space for sockets and PID files to satisfy read-only rootfs constraints.
      - /run:mode=0750,uid=2000,gid=2000,size=32m,noexec,nosuid
      - /tmp:mode=0750,uid=2000,gid=2000,size=8m,noexec,nosuid

    security_opt:
      # Prevents child processes from gaining more privileges than their parent (e.g., via setuid).
      - no-new-privileges:true

    # Principle of least privilege: drop all kernel capabilities and explicitly whitelist required ones.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # Uncomment NET_RAW if you use AGH as a DHCP server or need ICMP/ARP client tracking.
      # - NET_RAW

    deploy:
      # Caps host resource usage. Scale 'cpus' to 1.0+ for networks with 100+ clients.
      # IMPORTANT: If 'cpus' is increased, you must proportionally increase 'num-threads' in unbound.conf.
      # If Unbound's 'msg-cache-size' and 'rrset-cache-size' are expanded, raise the 'memory' limit here.
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m

    # Accommodates high-concurrency UDP/TCP connections necessary for a busy DNS resolver.
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Uncomment if LEGO_ENABLE=true. Requires the top-level secrets block below.
    # secrets:
    #   - source: acme_email
    #   - source: cf_dns_api_token

# Uncomment and populate the corresponding files in ./secrets if LEGO_ENABLE=true.
# secrets:
#   acme_email:
#     file: ./secrets/acme_email
#   cf_dns_api_token:
#     file: ./secrets/cf_dns_api_token

networks:
  dns:
    driver: bridge
    ipam:
      config:
        - subnet: 10.101.100.0/24
          gateway: 10.101.100.1
